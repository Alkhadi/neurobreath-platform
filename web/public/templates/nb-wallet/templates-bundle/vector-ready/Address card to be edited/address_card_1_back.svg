<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1204" viewBox="0 0 2100 1204" role="img" aria-labelledby="title" preserveAspectRatio="xMidYMid meet">
  <title id="title">Address Card — Back (Vector)</title>
  <defs>
    <style>
      :root {
        --nb-font: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        --nb-bg: #ffffff;
        --nb-text: #111827;
        --nb-muted: #6b7280;
        --nb-accent: #2563eb;
        --nb-accent-2: #1d4ed8;
        --nb-accent-3: #60a5fa;
        --nb-border: rgba(17,24,39,0.18);
      }
      .nb-field {
        font-family: var(--nb-font);
        fill: var(--nb-text);
      }
      .nb-muted { fill: var(--nb-muted); }
      .nb-accent { fill: var(--nb-accent); }
      .nb-stroke-accent { stroke: var(--nb-accent); }
      .nb-slot-outline {
        fill: rgba(37,99,235,0.10);
        stroke: rgba(37,99,235,0.35);
        stroke-width: 3;
      }
      .nb-box {
        fill: rgba(0,0,0,0);
        stroke: rgba(16,185,129,0.0);
        stroke-width: 1;
      }
    </style>
    <linearGradient id="nbBlueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="var(--nb-accent-3)" />
      <stop offset="0.5" stop-color="var(--nb-accent)" />
      <stop offset="1" stop-color="var(--nb-accent-2)" />
    </linearGradient>
    <linearGradient id="nbSoftBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0f2fe" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>
    <filter id="nbSoftShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="rgba(0,0,0,0.25)" />
    </filter>
    <clipPath id="clipRoundedCard">
      <rect x="0" y="0" width="2100" height="1204" rx="36.12" ry="36.12" />
    </clipPath>
  </defs>
  <g clip-path="url(#clipRoundedCard)">
  <defs>
    <clipPath id="clip_slot_profilePhoto"><rect x="1638.00" y="144.48" width="294.00" height="216.72" rx="13.00" ry="13.00" /></clipPath>
  </defs>
    <rect x="0" y="0" width="2100" height="1204" fill="url(#nbBlueGrad)" />
    <g opacity="0.22">
      <polygon points="0.00,0.00 504.00,0.00 0.00,457.52" fill="#ffffff" />
      <polygon points="2100.00,0.00 2100.00,264.88 1470.00,0.00" fill="#ffffff" />
      <polygon points="0.00,1204.00 588.00,1204.00 0.00,746.48" fill="#ffffff" />
      <polygon points="2100.00,1204.00 1512.00,1204.00 2100.00,746.48" fill="#ffffff" />
    </g>
    <g opacity="0.95">
      <rect x="840.00" y="361.20" width="420.00" height="240.80" rx="24.00" ry="24.00" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.18)" stroke-width="3" />
    </g>
    <g id="nb_editable">
      <rect x="1638.00" y="144.48" width="294.00" height="216.72" rx="13.00" ry="13.00" id="slot_profilePhoto_outline" class="nb-slot-outline" />
      <image id="slot_profilePhoto" x="1638.00" y="144.48" width="294.00" height="216.72" href="" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip_slot_profilePhoto)" />
      <rect x="168.00" y="156.52" width="1680.00" height="96.32" rx="0.00" ry="0.00" id="box_fullName" class="nb-box" />
      <text id="field_fullName" class="nb-field" x="168.00" y="204.68" font-size="72" font-weight="600" text-anchor="start" dominant-baseline="middle" fill="#ffffff">​</text>
      <rect x="168.00" y="433.44" width="1680.00" height="72.24" rx="0.00" ry="0.00" id="box_addressLine1" class="nb-box" />
      <text id="field_addressLine1" class="nb-field" x="168.00" y="469.56" font-size="48" font-weight="600" text-anchor="start" dominant-baseline="middle" fill="#ffffff">​</text>
      <rect x="168.00" y="505.68" width="1680.00" height="72.24" rx="0.00" ry="0.00" id="box_addressLine2" class="nb-box" />
      <text id="field_addressLine2" class="nb-field" x="168.00" y="541.80" font-size="48" font-weight="600" text-anchor="start" dominant-baseline="middle" fill="#ffffff">​</text>
      <rect x="168.00" y="602.00" width="1050.00" height="72.24" rx="0.00" ry="0.00" id="box_city" class="nb-box" />
      <text id="field_city" class="nb-field" x="168.00" y="638.12" font-size="48" font-weight="600" text-anchor="start" dominant-baseline="middle" fill="#ffffff">​</text>
      <rect x="168.00" y="674.24" width="840.00" height="72.24" rx="0.00" ry="0.00" id="box_postcode" class="nb-box" />
      <text id="field_postcode" class="nb-field" x="168.00" y="710.36" font-size="48" font-weight="600" text-anchor="start" dominant-baseline="middle" fill="#ffffff">​</text>
      <rect x="168.00" y="842.80" width="1260.00" height="72.24" rx="0.00" ry="0.00" id="box_phone" class="nb-box" />
      <text id="field_phone" class="nb-field" x="168.00" y="878.92" font-size="48" font-weight="600" text-anchor="start" dominant-baseline="middle" fill="#ffffff">​</text>
      <rect x="168.00" y="915.04" width="1470.00" height="72.24" rx="0.00" ry="0.00" id="box_email" class="nb-box" />
      <text id="field_email" class="nb-field" x="168.00" y="951.16" font-size="48" font-weight="600" text-anchor="start" dominant-baseline="middle" fill="#ffffff">​</text>
      <rect x="1638.00" y="390.00" width="294.00" height="294.00" rx="16" ry="16" id="slot_qr_outline" class="nb-slot-outline" />
      <image id="slot_qr" x="1638.00" y="390.00" width="294.00" height="294.00" href="" preserveAspectRatio="xMidYMid slice" />
    </g>
  </g>
</svg>
