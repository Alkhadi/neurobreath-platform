<svg xmlns="http://www.w3.org/2000/svg" width="1414" height="2000" viewBox="0 0 1414 2000" role="img" aria-labelledby="title" preserveAspectRatio="xMidYMid meet">
  <title id="title">Canva Border (plain) — Vector</title>
  <defs>
    <style><![CDATA[
      :root {
        --nb-font: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        --nb-bg: #ffffff;
        --nb-text: #111827;
        --nb-muted: #6b7280;
        --nb-accent: #2563eb;
        --nb-accent-2: #1d4ed8;
        --nb-accent-3: #60a5fa;
        --nb-border: rgba(17,24,39,0.18);
        --nb-accent: #111827;
      }
      .nb-field {
        font-family: var(--nb-font);
        fill: var(--nb-text);
      }
      .nb-muted { fill: var(--nb-muted); }
      .nb-accent { fill: var(--nb-accent); }
      .nb-stroke-accent { stroke: var(--nb-accent); }
      .nb-slot-outline {
        fill: rgba(37,99,235,0.10);
        stroke: rgba(37,99,235,0.35);
        stroke-width: 3;
      }
      .nb-box {
        fill: rgba(0,0,0,0);
        stroke: rgba(16,185,129,0.0);
        stroke-width: 1;
      }
    ]]></style>
    <linearGradient id="nbBlueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="var(--nb-accent-3)"/>
      <stop offset="0.5" stop-color="var(--nb-accent)"/>
      <stop offset="1" stop-color="var(--nb-accent-2)"/>
    </linearGradient>
    <linearGradient id="nbSoftBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="nbSoftShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <clipPath id="clipRoundedCard">
      <rect x="0" y="0" width="1414" height="2000" rx="42.42" ry="42.42"/>
    </clipPath>
  </defs>
  <g>
    <rect x="0.00" y="0.00" width="1414.00" height="2000.00" rx="0.00" ry="0.00" fill="#ffffff"/>
    <rect x="12.00" y="12.00" width="1390.00" height="1976.00" rx="140.00" ry="140.00" fill="none" stroke="#111827" stroke-width="24"/>
    <g id="nb_editable">
      <g id="nb_slots">
        <rect id="slot_qr" data-nb-slot="qr" x="1020" y="1580" width="300" height="300" rx="16" ry="16" opacity="0"/>
      </g>
    </g>
  </g>
</svg>
