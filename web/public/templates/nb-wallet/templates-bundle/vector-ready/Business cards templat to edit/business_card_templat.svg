</g>
      <circle cx="126.00" cy="972.00" r="36.00" fill="rgba(167,119,13,0.16)" />

<g transform="translate(112.00,958.00) scale(1.1667)" fill="none" stroke="var(--nb-accent)" stroke-width="1.71" stroke-linecap="round" stroke-linejoin="round">
