<path d="M8.5 3.5c.9 5.2 4.8 9.1 10 10l-2.2 2.2c-.5.5-1.3.7-2 .5-2.2-.7-4.1-1.9-5.7-3.5S5.8 9.8 5.1 7.6c-.2-.7 0-1.5.5-2L7.8 3.5z" transform="translate(112.00,886.00) scale(1.1667)" fill="none" stroke="var(--nb-accent)" stroke-width="1.71" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="126.00" cy="1044.00" r="36.00" fill="rgba(167,119,13,0.16)" />

<g transform="translate(112.00,1030.00) scale(1.1667)" fill="none" stroke="var(--nb-accent)" stroke-width="1.71" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="8" />
