<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – NeuroBreath</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a0033;
      color: #e0d6f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { max-width: 28rem; line-height: 1.6; opacity: 0.8; margin-bottom: 1.5rem; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">🌙</div>
  <h1>You&rsquo;re offline</h1>
  <p>
    NeuroBreath needs an internet connection for this page.
    Your progress is saved locally and will sync when you reconnect.
  </p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
