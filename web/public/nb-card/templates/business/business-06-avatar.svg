<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="business-06-avatar-title business-06-avatar-desc">
  <title id="business-06-avatar-title">Signature Gold — Business Avatar</title>
