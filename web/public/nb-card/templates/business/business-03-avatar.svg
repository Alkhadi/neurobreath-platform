<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="business-03-avatar-title business-03-avatar-desc">
  <title id="business-03-avatar-title">Consultant White — Business Avatar</title>
  <desc id="business-03-avatar-desc">Professional business avatar with clean consultant style</desc>
  <defs>
    <linearGradient id="business-03-avatar-bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1C2736;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333E50;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-business-03-avatar-clip"><rect x="0.0" y="0.0" width="1000.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-business-03-avatar-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-business-03-avatar-clip)" filter="url(#nb-premium-business-03-avatar-bevel)"><rect width="1000" height="1000" fill="url(#business-03-avatar-bg)" />
  <circle cx="500" cy="380" r="160" fill="#FFA308" opacity="0.18" />
  <ellipse cx="500" cy="720" rx="280" ry="200" fill="#FFA308" opacity="0.18" />
</g></svg>
