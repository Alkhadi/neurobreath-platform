<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="business-03-bg-title business-03-bg-desc">
  <title id="business-03-bg-title">Consultant White — Business Background</title>
  <desc id="business-03-bg-desc">Professional business template with white space and premium clarity</desc>
  <defs>
    <linearGradient id="business-03-base" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1C2736;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333E50;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-business-03-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-business-03-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-business-03-bg-clip)" filter="url(#nb-premium-business-03-bg-bevel)"><rect width="1600" height="1000" fill="url(#business-03-base)" />
  <rect x="200" y="200" width="1200" height="600" fill="#FFFFFF" opacity="0.03" rx="24" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#FFA308" stroke-width="2" opacity="0.3" rx="32" />
  <rect x="120" y="140" width="360" height="100" fill="#1C2736" opacity="0.6" rx="24" />
</g></svg>
