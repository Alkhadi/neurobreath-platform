<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="business-02-front-title" preserveAspectRatio="xMidYMid meet">
  <title id="business-02-front-title">Ocean Wave — Business Card Front</title>

  <defs>
    <linearGradient id="b02f-wave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C4A6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="b02f-wave2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="b02f-wave3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C4A6E;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:0.6" />
    </linearGradient>
    <clipPath id="b02f-clip">
      <rect x="0" y="0" width="1600" height="900" rx="36" ry="36" />
    </clipPath>
    <filter id="b02f-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB">
      <feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" />
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="highlight" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#b02f-clip)" filter="url(#b02f-bevel)">
    <!-- White background -->
    <rect width="1600" height="900" fill="#FFFFFF" />

    <!-- Top-right corner wave cluster -->
    <path d="M1100,0 C1200,0 1300,30 1400,80 C1500,130 1560,200 1600,280 L1600,0 Z" fill="url(#b02f-wave1)" opacity="0.9" />
    <path d="M1200,0 C1280,0 1380,50 1460,110 C1540,170 1580,240 1600,320 L1600,0 Z" fill="url(#b02f-wave2)" opacity="0.5" />
    <path d="M1350,0 C1420,20 1480,60 1530,120 C1570,170 1590,220 1600,260 L1600,0 Z" fill="#0C4A6E" opacity="0.3" />

    <!-- Bottom wave band -->
    <path d="M0,750 C200,700 400,720 600,710 C800,700 1000,730 1200,760 C1400,790 1500,800 1600,780 L1600,900 L0,900 Z" fill="url(#b02f-wave1)" />
    <path d="M0,780 C150,750 350,760 550,740 C750,720 950,760 1150,790 C1350,820 1500,830 1600,810 L1600,900 L0,900 Z" fill="url(#b02f-wave2)" opacity="0.7" />
    <path d="M0,820 C200,800 400,810 600,790 C800,770 1000,800 1200,830 C1400,860 1500,860 1600,840 L1600,900 L0,900 Z" fill="#0C4A6E" opacity="0.4" />

    <!-- Left-side accent wave (subtle) -->
    <path d="M0,200 C40,180 80,250 60,350 C40,450 80,500 0,550 Z" fill="url(#b02f-wave3)" opacity="0.4" />

    <!-- Logo placeholder (left side) -->
    <rect id="nb-card-logo-area" x="80" y="140" width="280" height="280" rx="24" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 4" />
    <image id="nb-card-logo" x="80" y="140" width="280" height="280" preserveAspectRatio="xMidYMid meet" href="" />
    <!-- Logo placeholder icon -->
    <g transform="translate(178,238)" opacity="0.35">
      <rect x="0" y="12" width="84" height="60" rx="8" fill="none" stroke="#64748B" stroke-width="3" />
      <circle cx="26" cy="34" r="12" fill="none" stroke="#64748B" stroke-width="2.5" />
      <polyline points="8,62 30,44 50,56 64,42 76,52" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linejoin="round" />
    </g>

    <!-- Name placeholder area (right of logo) -->
    <rect id="nb-card-name-area" x="420" y="160" width="500" height="60" rx="4" fill="none" />
    <text id="nb-card-name" x="420" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#0F172A">​</text>

    <!-- Title placeholder area -->
    <rect id="nb-card-title-area" x="420" y="230" width="400" height="40" rx="4" fill="none" />
    <text id="nb-card-title" x="420" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#0C4A6E" font-style="italic">​</text>

    <!-- Company placeholder area -->
    <text id="nb-card-company" x="80" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0F172A">​</text>

    <!-- Contact section with icon placeholders (right side) -->
    <g id="nb-card-contact-group" transform="translate(600, 340)">
      <!-- Email row -->
      <g>
        <text id="nb-card-email" x="0" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#334155" text-anchor="end" transform="translate(380,0)">​</text>
        <circle cx="420" cy="20" r="22" fill="none" stroke="#0C4A6E" stroke-width="2.5" />
        <g transform="translate(408,8)">
          <rect x="0" y="4" width="24" height="16" rx="3" fill="none" stroke="#0C4A6E" stroke-width="2" />
          <polyline points="0,4 12,14 24,4" fill="none" stroke="#0C4A6E" stroke-width="2" />
        </g>
      </g>

      <!-- Phone row -->
      <g transform="translate(0, 60)">
        <text id="nb-card-phone" x="0" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#334155" text-anchor="end" transform="translate(380,0)">​</text>
        <circle cx="420" cy="20" r="22" fill="none" stroke="#0C4A6E" stroke-width="2.5" />
        <g transform="translate(407,6)">
          <rect x="2" y="0" width="22" height="28" rx="4" fill="none" stroke="#0C4A6E" stroke-width="2" />
          <line x1="10" y1="24" x2="16" y2="24" stroke="#0C4A6E" stroke-width="2" />
        </g>
      </g>

      <!-- Address row -->
      <g transform="translate(0, 120)">
        <text id="nb-card-address-line1" x="0" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#334155" text-anchor="end" transform="translate(380,0)">​</text>
        <circle cx="420" cy="20" r="22" fill="none" stroke="#0C4A6E" stroke-width="2.5" />
        <g transform="translate(410,4)">
          <path d="M10,0 C14,0 20,6 20,14 C20,22 10,32 10,32 C10,32 0,22 0,14 C0,6 6,0 10,0 Z" fill="none" stroke="#0C4A6E" stroke-width="2" />
          <circle cx="10" cy="13" r="4" fill="none" stroke="#0C4A6E" stroke-width="1.5" />
        </g>
      </g>

      <!-- Website row -->
      <g transform="translate(0, 180)">
        <text id="nb-card-website" x="0" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#334155" text-anchor="end" transform="translate(380,0)">​</text>
        <circle cx="420" cy="20" r="22" fill="none" stroke="#0C4A6E" stroke-width="2.5" />
        <g transform="translate(407,7)">
          <circle cx="13" cy="13" r="12" fill="none" stroke="#0C4A6E" stroke-width="2" />
          <ellipse cx="13" cy="13" rx="6" ry="12" fill="none" stroke="#0C4A6E" stroke-width="1.5" />
          <line x1="1" y1="13" x2="25" y2="13" stroke="#0C4A6E" stroke-width="1.5" />
        </g>
      </g>
    </g>

    <!-- Photo placeholder (optional, near name) -->
    <image id="nb-card-photo" x="0" y="0" width="0" height="0" preserveAspectRatio="xMidYMid slice" href="" style="clip-path: circle(45%);" />
  </g>
</svg>
