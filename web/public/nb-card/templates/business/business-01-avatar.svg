<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="business-01-avatar-title business-01-avatar-desc">
  <title id="business-01-avatar-title">Executive Charcoal — Business Avatar</title>
  <desc id="business-01-avatar-desc">Professional business avatar with briefcase and monogram motifs for executive identity</desc>
  <defs>
    <linearGradient id="business-01-avatar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2736;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1627;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-business-01-avatar-clip"><rect x="0.0" y="0.0" width="1000.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-business-01-avatar-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  
  <g clip-path="url(#nb-premium-business-01-avatar-clip)" filter="url(#nb-premium-business-01-avatar-bevel)"><rect width="1000" height="1000" fill="url(#business-01-avatar-bg)" />
  
  
  <circle cx="500" cy="380" r="160" fill="#FFA308" opacity="0.2" />
  <ellipse cx="500" cy="720" rx="280" ry="200" fill="#FFA308" opacity="0.2" />
  
  
  <g transform="translate(720, 760)" opacity="0.5">
    <rect x="0" y="11" width="38" height="26" rx="3" fill="none" stroke="#4E44EF" stroke-width="3" />
    <rect x="14" y="0" width="10" height="11" fill="none" stroke="#4E44EF" stroke-width="2" stroke-linejoin="round" />
    <line x1="0" y1="23" x2="38" y2="23" stroke="#4E44EF" stroke-width="2" opacity="0.6" />
  </g>
</g></svg>
