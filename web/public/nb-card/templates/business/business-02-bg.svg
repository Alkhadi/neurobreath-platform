<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="business-02-bg-title business-02-bg-desc">
  <title id="business-02-bg-title">Startup Gradient — Business Background</title>
  <desc id="business-02-bg-desc">Professional business template with modern gradient and dynamic shape accents</desc>
  <defs>
    <linearGradient id="business-02-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1146DC;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#0F1627;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4E44EF;stop-opacity:0.3" />
    </linearGradient>
  <clipPath id="nb-premium-business-02-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-business-02-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-business-02-bg-clip)" filter="url(#nb-premium-business-02-bg-bevel)"><rect width="1600" height="1000" fill="url(#business-02-base)" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#4E44EF" stroke-width="2" opacity="0.4" rx="32" />
  <circle cx="1200" cy="300" r="150" fill="#1146DC" opacity="0.08" />
  <circle cx="400" cy="700" r="120" fill="#4E44EF" opacity="0.08" />
  <rect x="120" y="140" width="360" height="100" fill="#0F1627" opacity="0.5" rx="24" />
</g></svg>
