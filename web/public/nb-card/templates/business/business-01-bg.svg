<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="business-01-bg-title business-01-bg-desc">
  <title id="business-01-bg-title">Executive Charcoal — Business Profile Background</title>
  <desc id="business-01-bg-desc">Professional business template with charcoal gradient, briefcase motif, and executive presentation</desc>
  <defs>
    <linearGradient id="business-01-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1627;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1C2736;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1627;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="business-01-highlight" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#1146DC;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0F1627;stop-opacity:0" />
    </radialGradient>
    <pattern id="business-01-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#FFA308" opacity="0.15" />
    </pattern>
  <clipPath id="nb-premium-business-01-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-business-01-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  
  <g clip-path="url(#nb-premium-business-01-bg-clip)" filter="url(#nb-premium-business-01-bg-bevel)"><rect width="1600" height="1000" fill="url(#business-01-base)" />
  
  
  <ellipse cx="480" cy="300" rx="600" ry="500" fill="url(#business-01-highlight)" />
  
  
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#FFA308" stroke-width="2" opacity="0.3" rx="32" />
  
  
  <rect x="80" y="80" width="1440" height="840" fill="url(#business-01-grid)" opacity="0.6" />
  
  
  <g transform="translate(160, 120)" opacity="0.35">
    <rect x="0" y="15" width="50" height="35" rx="4" fill="none" stroke="#4E44EF" stroke-width="3" />
    <rect x="18" y="0" width="14" height="15" fill="none" stroke="#4E44EF" stroke-width="3" stroke-linejoin="round" />
    <line x1="0" y1="30" x2="50" y2="30" stroke="#4E44EF" stroke-width="2" opacity="0.6" />
  </g>
  
  
  <g transform="translate(1360, 800)" opacity="0.35">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="none" stroke="#FFA308" stroke-width="3" />
    <circle cx="25" cy="25" r="15" fill="none" stroke="#FFA308" stroke-width="2" />
  </g>
  
  
  <rect x="100" y="120" width="400" height="120" fill="#0F1627" opacity="0.4" rx="24" />
</g></svg>
