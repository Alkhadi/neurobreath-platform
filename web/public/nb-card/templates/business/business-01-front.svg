<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="business-01-front-title" preserveAspectRatio="xMidYMid meet">
  <title id="business-01-front-title">Executive Charcoal — Business Card Front</title>
  
  <defs>
    <linearGradient id="business-01-front-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1627;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1C2736;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1627;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="business-01-front-highlight" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#1146DC;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0F1627;stop-opacity:0" />
    </radialGradient>
    <pattern id="business-01-front-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#FFA308" opacity="0.15" />
    </pattern>
  <clipPath id="nb-premium-business-01-front-clip"><rect x="0.0" y="0.0" width="1600.0" height="900.0" rx="36.0" ry="36.0" /></clipPath><filter id="nb-premium-business-01-front-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  
  <g clip-path="url(#nb-premium-business-01-front-clip)" filter="url(#nb-premium-business-01-front-bevel)"><rect width="1600" height="900" fill="url(#business-01-front-base)" />
  
  
  <ellipse cx="480" cy="270" rx="600" ry="450" fill="url(#business-01-front-highlight)" />
  
  
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#FFA308" stroke-width="2" opacity="0.3" rx="32" />
  
  
  <rect x="80" y="80" width="1440" height="740" fill="url(#business-01-front-grid)" opacity="0.6" />
  
  
  <g transform="translate(160, 120)" opacity="0.35">
    <rect x="0" y="15" width="50" height="35" rx="4" fill="none" stroke="#4E44EF" stroke-width="3" />
    <rect x="18" y="0" width="14" height="15" fill="none" stroke="#4E44EF" stroke-width="3" stroke-linejoin="round" />
    <line x1="0" y1="30" x2="50" y2="30" stroke="#4E44EF" stroke-width="2" opacity="0.6" />
  </g>
  
  
  <rect x="100" y="120" width="700" height="500" fill="#0F1627" opacity="0.4" rx="24" />
  
  
  <image id="nb-card-photo" x="140" y="160" width="200" height="200" preserveAspectRatio="xMidYMid slice" href="" style="clip-path: circle(45%);" />
  
  
  <text id="nb-card-name" x="380" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF">​</text>
  <text id="nb-card-title" x="380" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#FFA308">​</text>
  <text id="nb-card-company" x="380" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#A0A7B4">​</text>
  
  
  <g id="nb-card-contact-group">
    <text id="nb-card-phone" x="380" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ECEEF1">​</text>
    <text id="nb-card-email" x="380" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ECEEF1">​</text>
    <a id="nb-card-website-link" href="https://neurobreath.com" target="_blank" rel="noopener">
      <text id="nb-card-website" x="380" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#65AAFF" text-decoration="underline">​</text>
    </a>
  </g>
  
  
  <image id="nb-card-logo" x="1200" y="650" width="300" height="150" preserveAspectRatio="xMidYMid meet" href="" />
  
  
  <rect id="nb-card-qr-bg" x="140" y="650" width="150" height="150" fill="#FFFFFF" rx="8" />
  <image id="nb-card-qr" x="150" y="660" width="130" height="130" preserveAspectRatio="xMidYMid meet" href="" />
</g></svg>
