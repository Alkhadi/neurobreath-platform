<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="business-01-back-title" preserveAspectRatio="xMidYMid meet">
  <title id="business-01-back-title">Executive Charcoal — Business Card Back</title>
  
  <defs>
    <linearGradient id="business-01-back-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1627;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1C2736;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1627;stop-opacity:1" />
    </linearGradient>
    <pattern id="business-01-back-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#FFA308" opacity="0.15" />
    </pattern>
  <clipPath id="nb-premium-business-01-back-clip"><rect x="0.0" y="0.0" width="1600.0" height="900.0" rx="36.0" ry="36.0" /></clipPath><filter id="nb-premium-business-01-back-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  
  <g clip-path="url(#nb-premium-business-01-back-clip)" filter="url(#nb-premium-business-01-back-bevel)"><rect width="1600" height="900" fill="url(#business-01-back-base)" />
  
  
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#FFA308" stroke-width="2" opacity="0.3" rx="32" />
  
  
  <rect x="80" y="80" width="1440" height="740" fill="url(#business-01-back-grid)" opacity="0.6" />
  
  
  <g transform="translate(1440, 100)" opacity="0.35">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="none" stroke="#FFA308" stroke-width="3" />
    <circle cx="25" cy="25" r="15" fill="none" stroke="#FFA308" stroke-width="2" />
  </g>
  
  
  <rect x="200" y="150" width="1200" height="600" fill="#0F1627" opacity="0.5" rx="32" />
  
  
  <g id="nb-card-back-content">
    
    <text id="nb-card-tagline" x="800" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#FFA308" text-anchor="middle">​</text>
    
    
    <text id="nb-card-specialty" x="800" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#ECEEF1" text-anchor="middle">​</text>
    
    
    <g id="nb-card-address-block">
      <text id="nb-card-address-line1" x="800" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#A0A7B4" text-anchor="middle">​</text>
      <text id="nb-card-address-line2" x="800" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#A0A7B4" text-anchor="middle">​</text>
      <text id="nb-card-address-country" x="800" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#A0A7B4" text-anchor="middle">​</text>
    </g>
    
    
    <g id="nb-card-social-handles">
      <a id="nb-card-instagram-link" href="https://instagram.com/neurobreath" target="_blank" rel="noopener">
        <text id="nb-card-instagram" x="500" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#65AAFF">​</text>
      </a>
      <a id="nb-card-linkedin-link" href="https://linkedin.com/company/neurobreath" target="_blank" rel="noopener">
        <text id="nb-card-linkedin" x="800" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#65AAFF" text-anchor="middle">​</text>
      </a>
      <a id="nb-card-twitter-link" href="https://twitter.com/neurobreath" target="_blank" rel="noopener">
        <text id="nb-card-twitter" x="1100" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#65AAFF" text-anchor="end">​</text>
      </a>
    </g>
  </g>
  
  
  <image id="nb-card-logo-large" x="650" y="100" width="300" height="100" preserveAspectRatio="xMidYMid meet" href="" />
</g></svg>
