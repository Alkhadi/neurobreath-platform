  <circle cx="1610" cy="70" r="3" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.2"/>

  <!-- Corner ornaments - bottom left -->
  <line x1="48" y1="960" x2="120" y2="1032" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
  <line x1="48" y1="980" x2="100" y2="1032" stroke="#3b82f6" stroke-width="0.8" opacity="0.15"/>
