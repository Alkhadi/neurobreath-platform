  <rect x="24" y="24" width="1632" height="1032" rx="20" fill="none" stroke="#1e293b" stroke-width="4"/>

  <!-- Inner frame border -->
  <rect x="48" y="48" width="1584" height="984" rx="14" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.3"/>

  <!-- Decorative double-line frame -->
  <rect x="64" y="64" width="1552" height="952" rx="10" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.15"/>

  <!-- Corner ornaments - top left -->
  <line x1="48" y1="120" x2="120" y2="48" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
