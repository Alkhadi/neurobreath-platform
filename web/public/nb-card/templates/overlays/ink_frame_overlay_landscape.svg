  <!-- Corner ornaments - bottom right -->
  <line x1="1632" y1="960" x2="1560" y2="1032" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
  <line x1="1632" y1="980" x2="1580" y2="1032" stroke="#3b82f6" stroke-width="0.8" opacity="0.15"/>
  <circle cx="1610" cy="1010" r="3" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.2"/>

