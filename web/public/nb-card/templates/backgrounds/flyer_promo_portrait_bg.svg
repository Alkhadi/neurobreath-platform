<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  
  
  
  
  <defs>
    <linearGradient id="flyerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6467F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E5DFF;stop-opacity:1" />
    </linearGradient>
    
    
    <pattern id="flyerPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white" opacity="0.05" />
    </pattern>
  <clipPath id="nb-premium-flyer-promo-portrait-bg-clip"><rect x="0.0" y="0.0" width="800.0" height="1200.0" rx="32.0" ry="32.0" /></clipPath><filter id="nb-premium-flyer-promo-portrait-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  
  <g clip-path="url(#nb-premium-flyer-promo-portrait-bg-clip)" filter="url(#nb-premium-flyer-promo-portrait-bg-bevel)"><rect width="800" height="1200" fill="url(#flyerGradient)" />
  <rect width="800" height="1200" fill="url(#flyerPattern)" />
  
  
  <rect x="0" y="0" width="800" height="200" fill="rgba(255,255,255,0.1)" />
  
  
  <rect x="40" y="240" width="720" height="720" fill="white" rx="16" />
  
  
  <rect x="60" y="780" width="680" height="120" fill="rgba(100,103,249,0.05)" rx="12" />
  
  
  <rect x="0" y="1080" width="800" height="120" fill="rgba(0,0,0,0.8)" />
  
  
  <circle cx="700" cy="100" r="60" fill="rgba(255,255,255,0.1)" />
  <circle cx="100" cy="1100" r="40" fill="rgba(255,255,255,0.1)" />
