<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="address-02-bg-title address-02-bg-desc">
  <title id="address-02-bg-title">City Compass — Address Background</title>
  <desc id="address-02-bg-desc">Professional address template with compass lines and city grid accents</desc>
  <defs>
    <linearGradient id="address-02-base" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F1F6FB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#CCDEED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ACC8DF;stop-opacity:1" />
    </linearGradient>
    <pattern id="address-02-lines" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="40" x2="80" y2="40" stroke="#6E8EAE" stroke-width="0.5" opacity="0.2" />
      <line x1="40" y1="0" x2="40" y2="80" stroke="#6E8EAE" stroke-width="0.5" opacity="0.2" />
    </pattern>
  <clipPath id="nb-premium-address-02-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-address-02-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-address-02-bg-clip)" filter="url(#nb-premium-address-02-bg-bevel)"><rect width="1600" height="1000" fill="url(#address-02-base)" />
  <rect x="80" y="80" width="1440" height="840" fill="url(#address-02-lines)" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#6E8EAE" stroke-width="2" opacity="0.3" rx="28" />
  <g transform="translate(1360, 120)" opacity="0.3">
    <circle cx="25" cy="25" r="30" fill="none" stroke="#6E8EAE" stroke-width="4" />
    <line x1="25" y1="0" x2="25" y2="15" stroke="#6E8EAE" stroke-width="3" />
    <line x1="25" y1="35" x2="25" y2="50" stroke="#6E8EAE" stroke-width="3" />
  </g>
  <rect x="100" y="750" width="400" height="120" fill="#F1F6FB" opacity="0.4" rx="24" />
</g></svg>
