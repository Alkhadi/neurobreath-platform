<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" role="img" aria-labelledby="t-address-01-avatar d-address-01-avatar">
  <title id="t-address-01-avatar">Address Slate Avatar — Professional placeholder</title>
  <desc id="d-address-01-avatar">Neutral professional avatar placeholder matching the Address Slate template</desc>

  <defs>
    <linearGradient id="a-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1F6FB" />
      <stop offset="1" stop-color="#6E8EAE" />
    </linearGradient>

    <radialGradient id="a-glow" cx="35%" cy="30%" r="60%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  <clipPath id="nb-premium-address-01-avatar-clip"><rect x="0.0" y="0.0" width="1000.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-address-01-avatar-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>

  
  <g clip-path="url(#nb-premium-address-01-avatar-clip)" filter="url(#nb-premium-address-01-avatar-bevel)"><circle cx="500" cy="500" r="460" fill="url(#a-base)" />
