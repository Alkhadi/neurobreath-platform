<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="address-03-bg-title address-03-bg-desc">
  <title id="address-03-bg-title">Neighbourhood Pro — Address Background</title>
  <desc id="address-03-bg-desc">Professional address template with minimal map-pin pattern and high readability</desc>
  <defs>
    <linearGradient id="address-03-base" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ACC8DF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F1F6FB;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-address-03-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-address-03-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-address-03-bg-clip)" filter="url(#nb-premium-address-03-bg-bevel)"><rect width="1600" height="1000" fill="url(#address-03-base)" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#6E8EAE" stroke-width="2" opacity="0.25" rx="32" />
  <g transform="translate(160, 800)" opacity="0.25">
    <path d="M 20,0 Q 30,0 30,15 Q 30,30 20,45 Q 10,30 10,15 Q 10,0 20,0 Z" fill="none" stroke="#6E8EAE" stroke-width="3" />
    <circle cx="20" cy="15" r="5" fill="#6E8EAE" opacity="0.4" />
  </g>
  <rect x="1100" y="120" width="380" height="120" fill="#F1F6FB" opacity="0.5" rx="24" />
</g></svg>
