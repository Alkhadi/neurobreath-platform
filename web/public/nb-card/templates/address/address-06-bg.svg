<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="address-06-bg-title address-06-bg-desc">
  <title id="address-06-bg-title">Route Card — Address Background</title>
  <desc id="address-06-bg-desc">Professional address template with route lines and clean contact focus</desc>
  <defs>
    <linearGradient id="address-06-base" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ACC8DF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#CCDEED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F1F6FB;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-address-06-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-address-06-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-address-06-bg-clip)" filter="url(#nb-premium-address-06-bg-bevel)"><rect width="1600" height="1000" fill="url(#address-06-base)" />
  <path d="M 200,200 Q 500,300 800,200 T 1400,200" fill="none" stroke="#6E8EAE" stroke-width="2" opacity="0.2" />
  <path d="M 200,800 Q 500,700 800,800 T 1400,800" fill="none" stroke="#6E8EAE" stroke-width="2" opacity="0.2" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#6E8EAE" stroke-width="2" opacity="0.3" rx="32" />
  <circle cx="200" cy="200" r="8" fill="#6E8EAE" opacity="0.3" />
  <circle cx="1400" cy="200" r="8" fill="#6E8EAE" opacity="0.3" />
  <rect x="120" y="140" width="360" height="100" fill="#F1F6FB" opacity="0.5" rx="20" />
