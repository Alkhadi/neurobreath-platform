<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="address-05-bg-title address-05-bg-desc">
  <title id="address-05-bg-title">Landmark Linework — Address Background</title>
  <desc id="address-05-bg-desc">Professional address template with fine linework and premium layout spacing</desc>
  <defs>
    <linearGradient id="address-05-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D9E4F0;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-address-05-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-address-05-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-address-05-bg-clip)" filter="url(#nb-premium-address-05-bg-bevel)"><rect width="1600" height="1000" fill="url(#address-05-base)" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#6E8EAE" stroke-width="1.5" opacity="0.4" rx="32" />
  <line x1="120" y1="500" x2="1480" y2="500" stroke="#6E8EAE" stroke-width="1" opacity="0.2" />
  <g transform="translate(160, 120)" opacity="0.25">
    <circle cx="20" cy="20" r="25" fill="none" stroke="#6E8EAE" stroke-width="2" />
    <circle cx="20" cy="20" r="15" fill="none" stroke="#6E8EAE" stroke-width="2" />
  </g>
  <rect x="120" y="120" width="380" height="100" fill="#F0F4F8" opacity="0.6" rx="20" />
</g></svg>
