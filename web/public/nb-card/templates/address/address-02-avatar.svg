<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="address-02-avatar-title address-02-avatar-desc">
  <title id="address-02-avatar-title">City Compass — Address Avatar</title>
  <desc id="address-02-avatar-desc">Professional address avatar with compass grid motif</desc>
  <defs>
    <linearGradient id="address-02-avatar-bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CCDEED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ACC8DF;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-address-02-avatar-clip"><rect x="0.0" y="0.0" width="1000.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-address-02-avatar-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-address-02-avatar-clip)" filter="url(#nb-premium-address-02-avatar-bevel)"><rect width="1000" height="1000" fill="url(#address-02-avatar-bg)" />
  <circle cx="500" cy="380" r="160" fill="#6E8EAE" opacity="0.25" />
  <ellipse cx="500" cy="720" rx="280" ry="200" fill="#6E8EAE" opacity="0.25" />
  <g transform="translate(720, 760)" opacity="0.35">
    <circle cx="19" cy="19" r="23" fill="none" stroke="#6E8EAE" stroke-width="3" />
    <line x1="19" y1="0" x2="19" y2="11" stroke="#6E8EAE" stroke-width="2" />
  </g>
</g></svg>
