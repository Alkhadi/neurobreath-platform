<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="bank-04-bg-title bank-04-bg-desc">
  <title id="bank-04-bg-title">Ledger Lines — Bank Background</title>
  <desc id="bank-04-bg-desc">Professional bank template with ledger lines and audit-style neatness</desc>
  <defs>
    <linearGradient id="bank-04-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B273A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C152A;stop-opacity:1" />
    </linearGradient>
    <pattern id="bank-04-ledger" x="0" y="0" width="100" height="50" patternUnits="userSpaceOnUse">
      <line x1="0" y1="25" x2="100" y2="25" stroke="#D7DBE1" stroke-width="0.5" opacity="0.2" />
    </pattern>
  <clipPath id="nb-premium-bank-04-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-bank-04-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-bank-04-bg-clip)" filter="url(#nb-premium-bank-04-bg-bevel)"><rect width="1600" height="1000" fill="url(#bank-04-base)" />
  <rect x="80" y="80" width="1440" height="840" fill="url(#bank-04-ledger)" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#D7DBE1" stroke-width="2" opacity="0.2" rx="32" />
  <rect x="140" y="140" width="340" height="100" fill="#0C152A" opacity="0.3" rx="20" />
</g></svg>
