      <stop offset="0%" style="stop-color:#1B273A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C152A;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-bank-01-avatar-clip"><rect x="0.0" y="0.0" width="1000.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-bank-01-avatar-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  
