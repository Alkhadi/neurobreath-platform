<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="bank-02-bg-title bank-02-bg-desc">
  <title id="bank-02-bg-title">Invoice Minimal — Bank Background</title>
  <desc id="bank-02-bg-desc">Professional bank template with minimal invoice layout and strong contrast</desc>
  <defs>
    <linearGradient id="bank-02-base" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0C152A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B273A;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-bank-02-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-bank-02-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
