  <line x1="120" y1="300" x2="1480" y2="300" stroke="#D7DBE1" stroke-width="1" opacity="0.15" />
  <line x1="120" y1="500" x2="1480" y2="500" stroke="#D7DBE1" stroke-width="1" opacity="0.15" />
  <line x1="120" y1="700" x2="1480" y2="700" stroke="#D7DBE1" stroke-width="1" opacity="0.15" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#05BD80" stroke-width="2" opacity="0.25" rx="32" />
  <rect x="120" y="120" width="380" height="120" fill="#0C152A" opacity="0.4" rx="24" />
</g></svg>
