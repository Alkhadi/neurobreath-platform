<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="bank-01-bg-title bank-01-bg-desc">
  <title id="bank-01-bg-title">Secure Navy — Bank Details Background</title>
  <desc id="bank-01-bg-desc">Professional bank template with navy gradient, shield security pattern, and payment clarity</desc>
  <defs>
    <linearGradient id="bank-01-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C152A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1B273A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C152A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bank-01-highlight" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#05BD80;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0C152A;stop-opacity:0" />
    </radialGradient>
    <pattern id="bank-01-ledger" x="0" y="0" width="60" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="60" y2="2" stroke="#D7DBE1" stroke-width="0.5" opacity="0.15" />
    </pattern>
  <clipPath id="nb-premium-bank-01-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-bank-01-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  
  <g clip-path="url(#nb-premium-bank-01-bg-clip)" filter="url(#nb-premium-bank-01-bg-bevel)"><rect width="1600" height="1000" fill="url(#bank-01-base)" />
  
  
  <ellipse cx="480" cy="300" rx="600" ry="500" fill="url(#bank-01-highlight)" />
  
  
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#D7DBE1" stroke-width="2" opacity="0.2" rx="32" />
  
  
  <rect x="80" y="80" width="1440" height="840" fill="url(#bank-01-ledger)" opacity="0.6" />
  
  
  <g transform="translate(160, 120)" opacity="0.25">
    <path d="M 0,0 L 40,0 L 40,50 Q 40,70 20,80 Q 0,70 0,50 Z" fill="none" stroke="#05BD80" stroke-width="3" stroke-linejoin="round" />
    <circle cx="20" cy="30" r="8" fill="none" stroke="#05BD80" stroke-width="2" />
  </g>
  
  
  <g transform="translate(1360, 800)" opacity="0.25">
    <rect x="10" y="20" width="30" height="30" rx="4" fill="none" stroke="#05BD80" stroke-width="3" />
    <path d="M 15,20 L 15,10 Q 15,0 25,0 Q 35,0 35,10 L 35,20" fill="none" stroke="#05BD80" stroke-width="3" stroke-linecap="round" />
  </g>
  
  
  <rect x="100" y="120" width="400" height="120" fill="#0C152A" opacity="0.3" rx="24" />
</g></svg>
