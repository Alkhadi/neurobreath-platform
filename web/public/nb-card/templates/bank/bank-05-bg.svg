<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="bank-05-bg-title bank-05-bg-desc">
  <title id="bank-05-bg-title">Trust Black — Bank Background</title>
  <desc id="bank-05-bg-desc">Professional bank template with black premium style and subtle shield pattern</desc>
  <defs>
    <linearGradient id="bank-05-base" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#080E1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C152A;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-bank-05-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-bank-05-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <g clip-path="url(#nb-premium-bank-05-bg-clip)" filter="url(#nb-premium-bank-05-bg-bevel)"><rect width="1600" height="1000" fill="url(#bank-05-base)" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#05BD80" stroke-width="2" opacity="0.35" rx="32" />
  <g transform="translate(160, 120)" opacity="0.2">
    <path d="M 0,0 L 50,0 L 50,62 Q 50,87 25,100 Q 0,87 0,62 Z" fill="none" stroke="#05BD80" stroke-width="3" stroke-linejoin="round" />
  </g>
  <rect x="120" y="120" width="380" height="120" fill="#080E1A" opacity="0.5" rx="24" />
</g></svg>
