<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="bank-06-bg-title bank-06-bg-desc">
  <title id="bank-06-bg-title">Clean Transfer — Bank Background</title>
  <desc id="bank-06-bg-desc">Professional bank template with simple transfer motif and high readability</desc>
  <defs>
    <linearGradient id="bank-06-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B273A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C152A;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-bank-06-bg-clip"><rect x="0.0" y="0.0" width="1600.0" height="1000.0" rx="40.0" ry="40.0" /></clipPath><filter id="nb-premium-bank-06-bg-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 Z" fill="#05BD80" opacity="0.2" />
    </marker>
  </defs>
  <g clip-path="url(#nb-premium-bank-06-bg-clip)" filter="url(#nb-premium-bank-06-bg-bevel)"><rect width="1600" height="1000" fill="url(#bank-06-base)" />
  <path d="M 300,500 L 1300,500" stroke="#05BD80" stroke-width="2" opacity="0.2" marker-end="url(#arrow)" />
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#D7DBE1" stroke-width="2" opacity="0.25" rx="32" />
  <rect x="120" y="140" width="360" height="100" fill="#0C152A" opacity="0.4" rx="24" />
</g></svg>
