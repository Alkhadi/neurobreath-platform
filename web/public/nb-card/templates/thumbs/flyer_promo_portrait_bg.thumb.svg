<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
  
  <defs>
    <linearGradient id="thumbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6467F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E5DFF;stop-opacity:1" />
    </linearGradient>
  <clipPath id="nb-premium-flyer-promo-portrait-bg-thumb-clip"><rect x="0.0" y="0.0" width="200.0" height="300.0" rx="24" ry="24" /></clipPath><filter id="nb-premium-flyer-promo-portrait-bg-thumb-bevel" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB"><feDropShadow dx="-1" dy="-1" stdDeviation="1.5" flood-color="#FFFFFF" flood-opacity="0.12" result="highlight" /><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.10" result="shadow" /><feMerge><feMergeNode in="shadow" /><feMergeNode in="highlight" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  
  <g clip-path="url(#nb-premium-flyer-promo-portrait-bg-thumb-clip)" filter="url(#nb-premium-flyer-promo-portrait-bg-thumb-bevel)"><rect width="200" height="300" fill="url(#thumbGradient)" rx="4" />
  <rect x="10" y="60" width="180" height="180" fill="white" rx="4" opacity="0.9" />
  <rect x="20" y="200" width="160" height="30" fill="rgba(100,103,249,0.2)" rx="3" />
  <rect x="0" y="270" width="200" height="30" fill="rgba(0,0,0,0.8)" />
  
  
  <text x="100" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">​</text>
</g></svg>
